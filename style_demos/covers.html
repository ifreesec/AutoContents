<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cover Design</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0a0a0a;
        }

        /* cover */
        .cover {
            position: relative;
            width: 1080px;
            height: 1440px;
            background: #1E2028;
            overflow: hidden;
        }

        /* cover_word - 固定宽度700px，文字自适应缩放 */
        .cover_word {
            position: absolute;
            width: 700px;
            left: 90px;
            top: 140px;
            font-family: 'Noto Sans SC', 'Source Han Sans CN', sans-serif;
            font-style: normal;
            font-weight: 900;
            color: #8E8E8E;
            white-space: nowrap;
            transform-origin: left center;
        }

        /* cover_title - 固定900x600，文字自适应缩放 */
        .cover_title {
            position: absolute;
            width: 900px;
            height: 600px;
            left: 90px;
            top: 330px;
            font-family: 'Noto Sans SC', 'Source Han Sans CN', sans-serif;
            font-style: normal;
            font-weight: 900;
            color: #06FFA5;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            overflow: hidden;
        }

        .cover_title span {
            display: block;
            width: 100%;
            line-height: 1.1;
        }

        /* cover_description - 固定900x200，文字自适应缩放 */
        .cover_description {
            position: absolute;
            width: 900px;
            height: 200px;
            left: 90px;
            top: 951px;
            font-family: 'Noto Sans SC', 'Source Han Sans CN', sans-serif;
            font-style: normal;
            font-weight: 400;
            color: #FFFFFF;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            overflow: hidden;
        }

        .cover_description span {
            display: block;
            width: 100%;
            line-height: 1.2;
        }

        /* cover_emoji */
        .cover_emoji {
            position: absolute;
            width: 300px;
            height: 300px;
            left: 690px;
            top: 1097px;
            font-family: 'Segoe UI Emoji', 'Apple Color Emoji', 'Noto Color Emoji', sans-serif;
            font-style: normal;
            font-weight: 400;
            font-size: 300px;
            line-height: 300px;
            color: #FFFFFF;
            opacity: 0.5;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="cover">
        <div class="cover_word" id="coverWord">Anthropic</div>
        <div class="cover_title" id="coverTitle"><span>标题文本多行显示巴拉巴拉好长</span></div>
        <div class="cover_description" id="coverDesc"><span>描述文本内容也非常长，但不能超过20字</span></div>
        <div class="cover_emoji">🚀</div>
    </div>

    <script>
        // 自适应缩放函数
        function fitText(element, maxWidth, maxHeight = null, maxFontSize = 300) {
            let fontSize = maxFontSize;
            element.style.fontSize = fontSize + 'px';
            
            // 如果是单行（cover_word）
            if (!maxHeight) {
                while (element.scrollWidth > maxWidth && fontSize > 10) {
                    fontSize--;
                    element.style.fontSize = fontSize + 'px';
                }
            } else {
                // 多行文本（cover_title 和 cover_description）
                const span = element.querySelector('span');
                while ((span.scrollWidth > maxWidth || span.scrollHeight > maxHeight) && fontSize > 10) {
                    fontSize--;
                    span.style.fontSize = fontSize + 'px';
                }
            }
        }

        // 初始化自适应
        window.onload = function() {
            // cover_word: 固定宽度700px，单行自适应
            fitText(document.getElementById('coverWord'), 700, null, 150);
            
            // cover_title: 固定900x600，多行自适应
            fitText(document.getElementById('coverTitle'), 900, 600, 150);
            
            // cover_description: 固定900x200，多行自适应
            fitText(document.getElementById('coverDesc'), 900, 200, 80);
        };
    </script>
</body>
</html>
