<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Details Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0a0a0a;
        }

        /* details */
        .details {
            position: relative;
            width: 1080px;
            height: 1440px;
            background: #1E2028;
            overflow: hidden;
        }

        /* Image - 自适应缩放，确保距离上下80px或左右80px */
        .image-container {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 20px 20px 0px #06FFA5;
            border-radius: 50px;
            overflow: hidden;
        }

        .image-container img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 50px;
        }
    </style>
</head>
<body>
    <div class="details">
        <div class="image-container" id="imageContainer">
            <img src="Image_demo.png" alt="Demo Image" id="demoImage">
        </div>
    </div>

    <script>
        function adjustImage() {
            const container = document.getElementById('imageContainer');
            const img = document.getElementById('demoImage');
            
            const maxWidth = 1080 - 80 * 2; // 920px
            const maxHeight = 1440 - 80 * 2; // 1280px
            
            // 获取图片原始尺寸
            const imgWidth = img.naturalWidth || 590;
            const imgHeight = img.naturalHeight || 1280;
            
            // 计算缩放比例，确保图片在限制区域内
            const scaleX = maxWidth / imgWidth;
            const scaleY = maxHeight / imgHeight;
            const scale = Math.min(scaleX, scaleY, 1); // 不超过原始尺寸
            
            const finalWidth = imgWidth * scale;
            const finalHeight = imgHeight * scale;
            
            container.style.width = finalWidth + 'px';
            container.style.height = finalHeight + 'px';
        }

        window.onload = adjustImage;
        window.onresize = adjustImage;
    </script>
</body>
</html>
